# ==============================================================================
# OpenOCD Configuration — STM32F407G-DISC1
#
# Used by 'make flash', 'make debug', and VS Code Cortex-Debug.
# Requires: OpenOCD with built-in ST-Link and STM32F4 target scripts.
# ==============================================================================

# ST-Link V2 debugger (on-board the Discovery)
source [find interface/stlink.cfg]

# SWD transport protocol
transport select hla_swd

# STM32F4 target
source [find target/stm32f4x.cfg]

# Adapter speed (kHz)
adapter speed 2000

# Reset configuration
reset_config srst_only srst_nogate
